<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>
    
    <style>
        
        body{
            margin: 0;
            padding: 0; 
            background-color: #1a1a1a;
            font-family: Arial, Helvetica, sans-serif;
        }

        .nav-container{
            margin-bottom: 40px;
        }

        h2{
            margin-bottom: 10px;
            color: wheat;
        }

        .nav1{
            background-color: #484848;
            padding: 10px;
        }

        .nav1 ul{
            /* background-color: white; */
            display: flex;
            justify-content: space-around;
            list-style: none;
            margin: 0px;
            padding: 0px;
            align-items: center;
        }

        .nav1 li{
            display: inline;
        }

        .nav1 a{
            text-decoration: none;
            color: aliceblue;
            /* background-color: blueviolet; */
            padding: 5px 10px;
            position: relative;
        }

        .nav1 .login-btn{
            background-color: #1a1a1a;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            /* cursor: crosshair; */
            border-radius: 5px;
        }

        .nav1 a::after{
            content: "";
            position: absolute;
            background-color: aqua;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
            height: 2px;
            width: 100%;
            bottom: 0;
            left: 0;
        }

        .nav1 a:hover::after{
            transform: scaleX(1);
        }

        /* part 2- styling vertical with hover effect */

        .nav2{
            background-color: #780a0a;
            width: 200px;
            padding: 20px;
        }

        .nav2 ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        .nav2 li{
            margin-bottom: 12px;
        }

        .nav2 a{
            text-decoration: none;
            color: white;
            display: block;
            padding: 10px;
            width: 100%;
        }

        .nav2 a:hover{
            /* margin-left: 30px; */
            width: 90%;
            background-color: #f12626;
        }

        .nav2 .login-btn{
            background-color: #ef2a2a;
            color: #fff;
            border: none;
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }

        /* .nav2 .login-btn:hover{
            background-color: #780a0a;
            border: 1px solid white;
        } */

        /* part 3 */
        .nav3{
            background-color: rgb(52, 169, 169);
            padding: 10px;
        }

        .nav3 ul{
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav3 a{
            text-decoration: none;
            color: #fff;
            padding: 10px;
            display: block;
        }

        .nav3 .dropdown-content{
            display: none;
        }
        
        .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position: absolute;
            background-color:#484848;
            width: 150px;
            margin-left: 20px;
            /* margin-top: 5px; */
            padding: 5px;
            border-radius: 5px;
        }

        .nav3 button{
            background-color: aqua;
            padding: 5px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>

</head>

<body>
    <div class="nav-container">
        <h2>Variation 1: Horizontal with underline Effect</h2>
        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>

    <div class="nav-container">
        <h2>Variation 2: Vertical with hover effect</h2>
        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
            </ul>
            <button class="login-btn">Login</button>
        </nav>
    </div>

    <div class="nav-container">
        <h2>Variation 3: Horizontal with dropdown</h2>
        <nav class="nav3">
            <ul>
                <li><a href="#">Home</a></li>
                <li class="dropdown"><a href="#">About</a>
                <div class="dropdown-content">
                    <a href="#">Our Story</a>
                    <a href="#">Team</a>
                    <a href="#">Contact</a>
                </div>
                </li>
                <li><a href="#">Products</a></li>
                <li><button>Login</button></li>
            </ul>
        </nav>
    </div>

</body>
</html>
