<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: #7f7f7fdc;
            border-radius: 10px;
            padding: 30px;
            width: 300px;
        }
        h1{
            color: rgb(183, 181, 181);
            text-align: center;
            margin-bottom: 20px;
        }
        form{
            display: flex;
            flex-direction: column ;
            /* gap: 10px; */
        }
        input{
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid;
            padding: 10px;
        }
        input:hover{
            border-color: rgb(200, 197, 197);
        }
        button{
            padding: 10px;
            border-radius: 5px;
            border: 1px solid;
            background-color: rgb(248, 240, 229);
            color: rgb(60, 58, 58);
        }   
        button:hover{
            background-color: rgb(200, 197, 197);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <form>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
