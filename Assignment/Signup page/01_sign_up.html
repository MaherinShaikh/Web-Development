<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body{
            background-color: rgb(4, 87, 4);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: rgb(142, 198, 142);
            width: 300px;
            border-radius: 10px;
            padding: 30px;
        }
        h1{
            color: rgb(26, 87, 37);
            text-align: center;
            margin-bottom: 15px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        input{
            border-radius: 5px;
            margin-bottom: 15px;
            padding: 8px;
            border: 1px solid;
        }
        input:hover{
            border-color: rgb(226, 229, 226);
        }
        button{
            padding: 8px;
            border-radius: 5px;
            border: 1px solid black;
            color: white;
            background-color: rgb(13, 89, 13);
        }
        button:hover{
            background-color: rgb(169, 243, 169);
            color: black;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sign Up</h1>
        <form>
            <input type="email" placeholder="Email">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="Last name">
            <input type="password" placeholder="Password">
            <button>Sign Up</button>
        </form>
        
    </div>
</body>
</html>
