<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic card</title>

    <style>
        :root{
            --primary-color: #D83344;
            --text-color: #333333;
            --background-color: #f5f5f7;
            --card-background: #ffffff;
        }

        body{
            margin: 0;
            padding: 20px;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container{
            /* background-color: aqua; */
            max-width: 400px;
            margin: 2rem auto;
        }

        .product{
            background-color: var(--card-background);
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product:hover{
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .img{
            height: 250px;
            /* background-color: rebeccapurple; */
            overflow: hidden;
        }

        .img img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info{
            padding: 0 20px;
        }

        .title{
            font-size: 1.2rem;
        }

        .description{
            font-size: 0.8rem;
        }

        .price{
            padding-bottom: 20px; 
            display: grid;
            grid-template-columns: 1fr 2fr;
        }

        .btn{
            display: flex;
            justify-content: space-around;
        }

        .prc{
            font-size: 1.3rem;
            font-weight: bolder;
            color: var(--primary-color);
            
        }

        .price .prc{
            /* background-color: green; */
            display: flex;
            align-items: center;
        }

        .cart{
            background-color: #928f8f;
            padding: 0 20px;
            border-radius: 25px;
            border: none;
            color: #ffffff;
            height: 40px;
            cursor: pointer;
        }

        .cart:hover{
            background-color: #333333;
        }

        .buy{
            background-color: var(--primary-color);
            border-radius: 25px;
            padding: 5px 20px;
            border: none;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
        }

        .buy:hover{
            background-color: #a00514;
        }
    </style>

</head>
<body>
    
    <div class="container">
        <div class="product">
            <div class="img">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSS2YmEk45TDf1A47Yn3BcsaaeiZRHNmWEc-Q&s" alt="" class="src">
            </div>
            <div class="info">
                <div class="title">
                    <h2>Nike Air Max</h2>
                </div>
                <div class="decription">
                    <p>Experience ultimate comfort and style with these iconic Nike Air Max sneakers.</p>
                </div>
                <div class="price">
                    <span class="prc">Rs. 1499</span>
                    <div class="btn">
                        <button class="cart">Add to Cart</button>
                        <button class="buy">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
