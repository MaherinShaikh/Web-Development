<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupcake card</title>

    <style>
        body{
            margin: 2rem 0 0 0;
            background-color: #fff;
            color: #161616;
        }

        h1{
            font-size: 1.5rem;
        }

        img{
            max-width: 100%;
            height: auto;
        }

        a{
            text-decoration: none;
        }

        .main{
            padding: 2rem 0;
            /* background-color: green; */
        }

        .bd-grid{
            /* background-color: red; */
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            max-width: 1200px;
            margin: 0 2.5rem;
            gap: 2rem;
            align-items: center;
        }

        .title-shop{
            margin: 0 2.5rem;
            position: relative;
        }

        .card{
            background-color: gray;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            padding: 1.5rem 2rem;
            position: relative;
            align-items: center;
            overflow: hidden;
        }

        article:nth-child(1){
            background-color: #E3F8FF;
        }

        article:nth-child(2){
            background-color: #DCFAFB;
        }

        article:nth-child(3){
            background-color: #FFE8DF;
        }

        article:nth-child(4){
            background-color: #E3F8FF;
        }

        .card__img{
            width: 180px;
            height: auto;
            padding: 3rem 0;
            transition: .5s;
        }
        .card__name{
            position: absolute;
            left: -25%;
            top: 0;
            width: 3.5rem;
            height: 100%;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            text-align: center;
            background-color: #161616;
            color: #fff;
            font-weight: bold;
            transition: .5s;
        }
        .card__icon{
            font-size: 1.5rem;
            color: #161616;
        }
        .card__icon:hover{
            color: #FF5151;
        }

        .card__precis{
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            transition: .5s;
        }

        .card__preci{
            display: block;
            text-align: center;
        }

        .card__preci--before{
            font-size: 0.75rem;
            color: #FF5151;
            margin-bottom: .30rem;
        }
        .card__preci--now{
            font-size: 1rem;
            font-weight: bold;
        }

        /* moving left */

        .card:hover{
            box-shadow: 0 .5rem 1rem #D1D9E6;
        }
        .card:hover .card__name{
            left: 0;
        }
        .card:hover .card__img{
            rotate: 30deg;
            margin-left: 3.5rem;
        }
        .card:hover .card__precis{
            margin-left: 3.5rem;
            padding: 0 1.5rem;
        }

    </style>

</head>
<body>
    <body>
        <h1 class="title-shop">SHOP</h1>
        <main class="main bd-grid">

            <article class="card">
                <div class="card__img">
                    <img src="https://i.postimg.cc/8PkwdTYd/image.png" alt="">
                </div>
                <div class="card__name">
                    <p>AIR ZOOM PEGASUS</p>
                </div>
                <div class="card__precis">
                    <a href="" class="card__icon"><ion-icon name="heart-outline"></ion-icon></a>
    
                    <div>
                        <span class="card__preci card__preci--before">$990.00</span>
                        <span class="card__preci card__preci--now">$749.00</span>
                    </div>
                    <a href="" class="card__icon"><ion-icon name="cart-outline"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="https://i.postimg.cc/4dBHXR1Z/image.png" alt="">
                </div>
                <div class="card__name">
                    <p>AIR ZOOM PEGASUS</p>
                </div>
                <div class="card__precis">
                    <a href="" class="card__icon"><ion-icon name="heart-outline"></ion-icon></a>
                    <div>
                        <span class="card__preci card__preci--before">$990.00</span>
                        <span class="card__preci card__preci--now">$749.00</span>
                    </div>
                    <a href="" class="card__icon"><ion-icon name="cart-outline"></ion-icon></a>
                </div>
            </article>

            <article class="card">
            <div class="card__img">
                <img src="https://i.postimg.cc/DfRL0nTy/image.png" alt="">
            </div>
            <div class="card__name">
                <p>AIR ZOOM PEGASUS</p>
            </div>
            <div class="card__precis">
                <a href="" class="card__icon"><ion-icon name="heart-outline"></ion-icon></a>
            
                <div>
                    <span class="card__preci card__preci--before">$990.00</span>
                    <span class="card__preci card__preci--now">$749.00</span>
                </div>
                <a href="" class="card__icon"><ion-icon name="cart-outline"></ion-icon></a>
            </div>
            </article>
            
            <article class="card">
                <div class="card__img">
                    <img src="https://i.postimg.cc/DfRL0nTy/image.png" alt="">
                </div>
                <div class="card__name">
                    <p>AIR ZOOM PEGASUS</p>
                </div>
                <div class="card__precis">
                    <a href="" class="card__icon"><ion-icon name="heart-outline"></ion-icon></a>
            
                    <div>
                        <span class="card__preci card__preci--before">$990.00</span>
                        <span class="card__preci card__preci--now">$749.00</span>
                    </div>
                    <a href="" class="card__icon"><ion-icon name="cart-outline"></ion-icon></a>
                </div>
            </article>


        </main>
        <!-- ICONS -->
        <script src="https://unpkg.com/ionicons@5.0.0/dist/ionicons.js"></script>
    </body>

</body>
</html>
